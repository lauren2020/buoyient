name: Publish iOS XCFramework

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build XCFramework
        run: ./gradlew :syncable-objects:assembleBuoyientReleaseXCFramework

      - name: Zip XCFramework
        run: |
          cd syncable-objects/build/XCFrameworks/release
          zip -r Buoyient.xcframework.zip Buoyient.xcframework

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(shasum -a 256 syncable-objects/build/XCFrameworks/release/Buoyient.xcframework.zip | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload XCFramework
        uses: softprops/action-gh-release@v2
        with:
          files: syncable-objects/build/XCFrameworks/release/Buoyient.xcframework.zip
          generate_release_notes: true

      - name: Update Package.swift with release URL and checksum
        env:
          TAG: ${{ steps.version.outputs.tag }}
          CHECKSUM: ${{ steps.checksum.outputs.sha256 }}
        run: |
          python3 -c "
          import os, re
          tag = os.environ['TAG']
          checksum = os.environ['CHECKSUM']
          text = open('Package.swift').read()
          replacement = (
              '        // BUOYIENT-BINARY-TARGET-START\n'
              '        .binaryTarget(\n'
              '            name: \"Buoyient\",\n'
              '            url: \"https://github.com/lauren2020/buoyient/releases/download/{tag}/Buoyient.xcframework.zip\",\n'
              '            checksum: \"{checksum}\"\n'
              '        ),\n'
              '        // BUOYIENT-BINARY-TARGET-END'
          ).format(tag=tag, checksum=checksum)
          text = re.sub(
              r'// BUOYIENT-BINARY-TARGET-START.*?// BUOYIENT-BINARY-TARGET-END',
              replacement, text, flags=re.DOTALL)
          open('Package.swift', 'w').write(text)
          "

      - name: Commit and push updated Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add Package.swift
          git diff --cached --quiet && echo "No changes to Package.swift" && exit 0
          git commit -m "Update Package.swift for ${{ steps.version.outputs.tag }} release"
          git push origin main
